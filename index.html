<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ElPsyCongroo408 文档</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <link rel="stylesheet" href="./assets/styles.css?v=20260626-reading-progress" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button menu-button" id="menu-button" type="button" aria-label="打开目录" title="打开目录">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="brand">
          <strong>ElPsyCongroo408 文档</strong>
          <span id="doc-count">加载中</span>
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar" id="sidebar" aria-label="文档目录">
          <div class="sidebar-tools">
            <label class="search-box" for="search-input">
              <span aria-hidden="true"></span>
              <input id="search-input" type="search" autocomplete="off" placeholder="搜索文件" />
            </label>
          </div>
          <nav class="tree" id="tree" aria-label="文件树"></nav>
        </aside>

        <main class="viewer" id="viewer">
          <div class="doc-toolbar">
            <div class="doc-heading">
              <div class="breadcrumb" id="breadcrumb"></div>
              <h1 id="doc-title">文档</h1>
              <div class="doc-progress" id="doc-progress">阅读进度 0%</div>
            </div>
            <div class="doc-actions">
              <button class="action-button" id="llm-open" type="button">AI分析</button>
              <button class="action-button" id="llm-settings-toolbar" type="button">设置</button>
              <a class="action-button" id="raw-link" href="#" target="_blank" rel="noreferrer">源文件</a>
              <button class="action-button" id="copy-link" type="button">复制链接</button>
            </div>
          </div>
          <article class="markdown-body" id="content" aria-live="polite">
            <p>正在加载文档...</p>
          </article>
        </main>
      </div>
    </div>
    <button class="scrim" id="scrim" type="button" aria-label="关闭目录"></button>
    <button class="llm-scrim" id="llm-scrim" type="button" aria-label="关闭 AI 对话" hidden></button>
    <button class="llm-fab" id="llm-fab" type="button" aria-label="打开 AI 对话" title="打开 AI 对话">AI</button>
    <section class="llm-panel" id="llm-panel" aria-label="AI 对话" aria-hidden="true" hidden>
      <header class="llm-header">
        <div>
          <h2>当前文档对话</h2>
          <p id="llm-context-label">等待文档加载</p>
        </div>
        <div class="llm-header-actions">
          <button class="action-button" id="llm-settings-open" type="button">设置</button>
          <button class="action-button" id="llm-close" type="button" aria-label="关闭 AI 对话" title="关闭">关闭</button>
        </div>
      </header>

      <div class="llm-panel-body">
        <div class="llm-chat" id="llm-chat-messages" aria-live="polite"></div>
      </div>

      <footer class="llm-composer">
        <div class="llm-prompts" id="llm-prompts" role="group" aria-label="分析模板">
          <button class="prompt-chip" type="button" data-prompt="summary">总结重点</button>
          <button class="prompt-chip" type="button" data-prompt="mistakes">易错点</button>
          <button class="prompt-chip" type="button" data-prompt="quiz">出题自测</button>
        </div>

        <label class="form-field prompt-field" for="llm-message-input">
          <span>消息</span>
          <textarea id="llm-message-input" rows="3" placeholder="询问当前文档，Enter 发送，Shift+Enter 换行"></textarea>
        </label>

        <div class="llm-runbar">
          <button class="action-button primary-action" id="llm-send" type="button">发送</button>
          <button class="action-button" id="llm-stop" type="button" disabled>停止</button>
          <button class="action-button" id="llm-clear-chat" type="button">清空</button>
        </div>
        <div class="llm-status" id="llm-status" role="status" aria-live="polite"></div>
      </footer>
    </section>

    <dialog class="llm-settings-dialog" id="llm-settings-dialog" aria-label="AI 设置" hidden>
      <form class="llm-config" id="llm-config-form" method="dialog">
        <header class="settings-header">
          <h2>AI 设置</h2>
          <button class="action-button" id="llm-settings-close" type="button">关闭</button>
        </header>
        <div class="form-grid">
          <label class="form-field">
            <span>API 地址</span>
            <input id="llm-base-url" type="url" placeholder="https://api.deepseek.com" autocomplete="off" />
          </label>
          <label class="form-field">
            <span>API Key</span>
            <input id="llm-api-key" type="password" autocomplete="off" />
          </label>
          <label class="form-field">
            <span>模型</span>
            <input id="llm-model" type="text" placeholder="deepseek-v4-flash" autocomplete="off" />
          </label>
          <label class="form-field">
            <span>温度</span>
            <input id="llm-temperature" type="number" min="0" max="2" step="0.1" />
          </label>
          <label class="form-field">
            <span>最大输出</span>
            <input id="llm-max-tokens" type="number" min="128" max="12000" step="128" />
          </label>
        </div>
        <div class="llm-config-actions">
          <button class="action-button primary-action" type="submit">保存配置</button>
          <button
            class="action-button"
            id="llm-clear-current-chat"
            type="button"
            aria-label="清除当前文档对话记录"
            title="只清除当前文档的对话记录"
          >
            清除当前对话
          </button>
          <button class="action-button" id="llm-clear-config" type="button">清除配置</button>
        </div>
        <div class="llm-status" id="llm-settings-status" role="status" aria-live="polite"></div>
      </form>
    </dialog>
    <script type="module" src="./assets/app.js?v=20260626-direct-progress-restore"></script>
  </body>
</html>
